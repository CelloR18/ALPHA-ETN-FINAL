<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado RIPEAM - Interativo Passo a Passo</title>

<style>

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding: 20px;
    color: #fff;
}

/* TÍTULO */
h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
    letter-spacing: 1px;
    color: #ffffff;
}

/* CARD PRINCIPAL */
.question-container {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 30px;
    margin: 0 auto;
    max-width: 750px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}

/* PERGUNTA */
#question {
    font-size: 20px;
    margin-bottom: 20px;
}

/* BOTÕES */
.options button {
    display: block;
    margin: 10px 0;
    padding: 14px;
    width: 100%;
    text-align: left;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 16px;
    transition: all 0.25s ease;
}

/* HOVER */
.options button:hover:not(:disabled) {
    background: #2196F3;
    transform: scale(1.02);
}

/* CORRETO */
.correct {
    background: #4CAF50 !important;
    color: #fff;
    box-shadow: 0 0 10px #4CAF50;
}

/* ERRADO */
.wrong {
    background: #F44336 !important;
    color: #fff;
    box-shadow: 0 0 10px #F44336;
}

/* BOTÃO PRÓXIMA */
#nextBtn {
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #2196F3, #00c6ff);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
    font-size: 16px;
    transition: 0.3s;
}

#nextBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

/* RESULTADO */
#resultado {
    margin-top: 40px;
    font-size: 24px;
    text-align: center;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<h1>Simulado RIPEAM</h1>

<div class="question-container">
    <div id="question"></div>
    <div class="options" id="options"></div>
    <button id="nextBtn" onclick="nextQuestion()">Próxima</button>
</div>

<div id="resultado"></div>

<script>

const questions = [

/* =========================
   20 QUESTÕES ORIGINAIS
========================= */

{
        q: "Qual a finalidade do RIPEAM?", 
        options: [
            "regulamentar as manobras, luzes de navegação e de condições especiais, em águas de jurisdição nacional.",

        answer: 1
    },
    {

        ], 
        answer: 3

    {
        q: "Toda manobra deverá ser feita de que forma?",

            "brusca e com variações constantes de velocidade, para que a outra embarcação perceba a alteração do rumo.",

            "marcação constante e distância constante."

    {
        q: "Uma embarcação alcançando a outra tem preferência de passagem, ou não, e como deve se proceder tal manobra?",

        answer: 3
    },
    {
        q: "Num canal ou rio estreito, a embarcação maior tem em relação à embarcação miúda:",

    {
        q: "Numa situação de risco de abalroamento, como é chamada a embarcação que não tem obrigação de manobrar?",

        answer: 2

    {
        q: "Quando ocorre uma situação de risco de abalroamento e verifica-se que uma das embarcações tem preferência, qual deverá ser a atitude a ser tomada pela embarcação preferenciada?",

        answer: 3

    {
        q: "Uma embarcação sem governo tem preferência em relação à:", 
        options: [

        answer: 4

    {
        q: "No rio onde duas embarcações de esporte e recreio navegam em rumos opostos como deverá ser a manobra e quem tem preferência?", 
        options: [

            "a que vem contra a corrente deverá se posicionar no meio do rio e a outra na sua margem direita, sendo que a que vem contra a corrente tem preferência.",
            "a que vem a favor da corrente deverá se posicionar no meio do rio e a outra na sua margem de boreste, sendo que a que vem a favor da corrente tem preferência.",
            "a que vem contra a corrente deverá se posicionar na margem de bombordo mais próxima, e a outra no meio do rio, não havendo preferência de manobra entre elas.",

        answer: 2
    },
    {
        q: "A forma mais correta de cruzar com outra embarcação vindo em sentido contrário é:", 
        options: [

            "boreste com bombordo.",
            "cortando a sua proa.",
            "tanto faz.",
            "bombordo com bombordo."
        ], 
        answer: 4
    },
    {
        q: "Em canais estreitos, como as embarcações devem navegar?", 
        options: [
            "pela margem mais próxima a seu bombordo e sempre manobrar para boreste quando verificar o risco de colisão.",
            "pela margem mais próxima a seu boreste e sempre manobrar para boreste quando verificar o risco de colisão.",
            "pela margem mais próxima a seu bombordo e sempre manobrar para bombordo quando verificar risco de colisão.",
            "pela margem mais próxima a seu boreste e sempre manobrar para bombordo quando verificar risco de colisão.",

        answer: 1

        answer: 2

    {
        q: "Os sinais sonoros que podem ser emitidos por apitos, buzinas ou ainda sinos, são utilizados:",

            "2 segundos.",

            "1 minuto.",
            "aproximadamente 1 segundo.",
            "3 a 5 segundos."

        answer: 3
    },
    {
        q: "O apito longo tem duração de:", 
        options: [
            "2 segundos.",
            "4 a 6 segundos.",
            "1 minuto.",
            "aproximadamente 1 segundo.",
            "7 a 10 segundos."
        ], 
        answer: 1
    },

/* =========================
   20 QUESTÕES NOVAS (SUAS)
========================= */


{
q: "O apito longo tem duração de:",
options: ["2 segundos.", "4 a 6 segundos.", "1minuto.", "aproximadamente 1 segundo.", "10 segundos."],
answer: 1
},
{
q: "Um apito curto significa:",
options: ["estou dando máquinas atrás.", "estou guinando para boreste.", "estou guinando para bombordo.", "estou dando máquinas adiante.", "estou parando máquinas."],
answer: 1
},
{
q: "Dois apitos curtos significam:",
options: ["estou dando máquinas atrás.", "estou guinando para boreste.", "estou guinando para bombordo.", "estou parando máquinas.", "estou dando máquinas adiante."],

},
{
q: "Três apitos curtos significam:",
options: ["estou dando máquinas atrás.", "estou guinando para boreste.", "estou guinando para bombordo.", "estou parando máquinas.", "estou dando máquinas adiante."],

q: "Dois apitos longos seguido de um apito curto significam:",
options: ["estou dando atrás.", "tenciono ultrapassar por seu boreste.", "estou ultrapassando por bombordo.", "concordo com sua ultrapassagem.", "estou parando máquinas."],

},
{
q: "Dois apitos longos seguidos de dois apitos curtos significam:",

q: "Cinco apitos curtos ou mais significam:",
options: ["estou dando atrás.", "estou parando máquinas.", "embarcação fundeada em visibilidade restrita.", "estou dando máquinas adiante.", "não entendi suas intenções de manobra."],
answer: 4

{

options: ["engajada em pesca de arrasto.", "parando máquinas.", "em operação de remoção de minas (bombas).", "sem governo.", "manobra restrita devida a seu calado."],
answer: 2
}
]
let current = 0;
let score = 0;

function loadQuestion() {
    const q = questions[current];
    document.getElementById("question").innerText = (current+1) + ". " + q.q;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => selectAnswer(btn, i);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("nextBtn").style.display = "none";
}

function selectAnswer(btn, i) {
    const correct = questions[current].answer;
    const buttons = document.querySelectorAll(".options button");

    buttons.forEach(b => b.disabled = true);

    if(i === correct){
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
        buttons[correct].classList.add("correct");
    }

    document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion(){
    current++;
    if(current < questions.length){
        loadQuestion();
    } else {
        document.querySelector(".question-container").style.display = "none";
        document.getElementById("resultado").innerText =
            "Você acertou " + score + " de " + questions.length + " questões.";
    }
}

loadQuestion();

</script>

</body>
</html>
