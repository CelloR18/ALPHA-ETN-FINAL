/* TÍTULO */

    text-align: center;

    font-size: 32px;
    letter-spacing: 1px;
    color: #ffffff;
}

/* CARD PRINCIPAL */

    backdrop-filter: blur(12px);

    padding: 30px;

/* PERGUNTA */

    margin-bottom: 20px;
}

/* BOTÕES */
.options button {

/* HOVER */

}

/* CORRETO */

}

/* ERRADO */

    transition: 0.3s;

#nextBtn:hover {

    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);

</head>

let score = 0;
let currentIndex = 0;

const quizContainer = document.getElementById("quiz-container");
const nextBtn = document.getElementById("nextBtn");
const resultadoDiv = document.getElementById("resultado");

function showQuestion(index) {
    quizContainer.style.opacity = 0;
    setTimeout(() => {
        const q = questions[index];
        quizContainer.innerHTML = `<h3>${index + 1}. ${q.question}</h3><div class="options"></div>`;
        const optionsDiv = quizContainer.querySelector(".options");
        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.textContent = opt;
            btn.addEventListener("click", () => selectAnswer(btn, i, q.answer));
            optionsDiv.appendChild(btn);
        });
        quizContainer.style.opacity = 1;
        nextBtn.style.display = "none";
    }, 200);
}

function selectAnswer(button, selected, correct) {
    const buttons = quizContainer.querySelectorAll("button");
    buttons.forEach(b => b.disabled = true);

    if (selected === correct) {
        button.classList.add("correct");
        score++;
    } else {
        button.classList.add("wrong");
        buttons[correct].classList.add("correct");
    }
    nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", () => {
    currentIndex++;
    if (currentIndex < questions.length) {
        showQuestion(currentIndex);
    } else {
        quizContainer.style.display = "none";
        nextBtn.style.display = "none";
        resultadoDiv.textContent = `Você acertou ${score} de ${questions.length} questões.`;
    }
});

// Inicializa o quiz
showQuestion(currentIndex);
