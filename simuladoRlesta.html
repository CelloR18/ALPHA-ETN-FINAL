<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado RIPEAM - Interativo Passo a Passo</title>
<style>

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding: 20px;
    color: #fff;
}

/* TÍTULO */
h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
    letter-spacing: 1px;
    color: #ffffff;
}

/* CARD PRINCIPAL */
.question-container {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 30px;
    margin: 0 auto;
    max-width: 750px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}

/* PERGUNTA */
#question {
    font-size: 20px;
    margin-bottom: 20px;
}

/* BOTÕES */
.options button {
    display: block;
    margin: 10px 0;
    padding: 14px;
    width: 100%;
    text-align: left;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 16px;
    transition: all 0.25s ease;
}

/* HOVER */
.options button:hover:not(:disabled) {
    background: #2196F3;
    transform: scale(1.02);
}

/* CORRETO */
.correct {
    background: #4CAF50 !important;
    color: #fff;
    box-shadow: 0 0 10px #4CAF50;
}

/* ERRADO */
.wrong {
    background: #F44336 !important;
    color: #fff;
    box-shadow: 0 0 10px #F44336;
}

/* BOTÃO PRÓXIMA */
#nextBtn {
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #2196F3, #00c6ff);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
    font-size: 16px;
    transition: 0.3s;
}

#nextBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

/* RESULTADO */
#resultado {
    margin-top: 40px;
    font-size: 24px;
    text-align: center;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

</style>
</head>
<body>

<h1>Simulado R-LESTA</h1>

<div id="quiz-container" class="question-container"></div>
<button id="nextBtn">Próxima</button>
<div id="resultado"></div>

let score = 0;
let currentIndex = 0;

const quizContainer = document.getElementById("quiz-container");
const nextBtn = document.getElementById("nextBtn");
const resultadoDiv = document.getElementById("resultado");

function showQuestion(index) {
    quizContainer.style.opacity = 0;
    setTimeout(() => {
        const q = questions[index];
        quizContainer.innerHTML = `<h3>${index + 1}. ${q.question}</h3><div class="options"></div>`;
        const optionsDiv = quizContainer.querySelector(".options");
        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.textContent = opt;
            btn.addEventListener("click", () => selectAnswer(btn, i, q.answer));
            optionsDiv.appendChild(btn);
        });
        quizContainer.style.opacity = 1;
        nextBtn.style.display = "none";
    }, 200);
}

function selectAnswer(button, selected, correct) {
    const buttons = quizContainer.querySelectorAll("button");
    buttons.forEach(b => b.disabled = true);

    if (selected === correct) {
        button.classList.add("correct");
        score++;
    } else {
        button.classList.add("wrong");
        buttons[correct].classList.add("correct");
    }
    nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", () => {
    currentIndex++;
    if (currentIndex < questions.length) {
        showQuestion(currentIndex);
    } else {
        quizContainer.style.display = "none";
        nextBtn.style.display = "none";
        resultadoDiv.textContent = `Você acertou ${score} de ${questions.length} questões.`;
    }
});

// Inicializa o quiz
showQuestion(currentIndex);
</script>

</body>
</html>
